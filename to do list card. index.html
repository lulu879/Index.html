<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card — Stage 0</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f14;
      --surface: #16181f;
      --surface2: #1e2028;
      --border: #2a2d38;
      --text: #e8eaf0;
      --muted: #7c8099;
      --accent: #7b68ee;
      --accent2: #5be6c8;
      --danger: #ff6b6b;
      --warn: #ffc26b;
      --ok: #6bffb8;
      --low: #6bffb8;
      --medium: #ffc26b;
      --high: #ff6b6b;
      --done: #5be6c8;
      --radius: 18px;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      padding: 24px 16px;
      background-image: radial-gradient(ellipse at 20% 20%, #1a1440 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, #0d2a22 0%, transparent 60%);
    }

    /* === CARD === */
    article[data-testid="test-todo-card"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      box-shadow: 0 0 0 1px #ffffff08, 0 24px 60px #00000066;
      transition: box-shadow 0.3s ease;
      position: relative;
    }

    article[data-testid="test-todo-card"]:focus-within {
      box-shadow: 0 0 0 2px var(--accent), 0 24px 60px #00000066;
    }

    /* top colour stripe */
    .card-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .card-inner {
      padding: 24px;
    }

    /* === HEADER ROW === */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }

    /* checkbox */
    .toggle-wrap {
      flex-shrink: 0;
      margin-top: 3px;
    }

    input[data-testid="test-todo-complete-toggle"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: grid;
      place-content: center;
      outline: none;
    }

    input[data-testid="test-todo-complete-toggle"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    input[data-testid="test-todo-complete-toggle"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    input[data-testid="test-todo-complete-toggle"]:checked::after {
      content: '';
      display: block;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .title-group { flex: 1; min-width: 0; }

    h2[data-testid="test-todo-title"] {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      transition: color 0.25s, text-decoration 0.25s;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .card-root.done h2[data-testid="test-todo-title"] {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* === BADGES ROW === */
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      font-family: var(--mono);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    [data-testid="test-todo-priority"][data-level="Low"] {
      background: #0d2a1e;
      color: var(--low);
      border: 1px solid #1a4a35;
    }
    [data-testid="test-todo-priority"][data-level="Medium"] {
      background: #2a1e00;
      color: var(--medium);
      border: 1px solid #4a3800;
    }
    [data-testid="test-todo-priority"][data-level="High"] {
      background: #2a0e0e;
      color: var(--high);
      border: 1px solid #4a1a1a;
    }

    [data-testid="test-todo-status"] {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .card-root.done [data-testid="test-todo-status"] {
      background: #0d2622;
      color: var(--done);
      border-color: #1a4a3f;
    }

    /* === DESCRIPTION === */
    p[data-testid="test-todo-description"] {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      margin: 14px 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* === DIVIDER === */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* === DATE BLOCK === */
    .date-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 16px;
    }

    .date-label {
      font-size: 0.68rem;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    time[data-testid="test-todo-due-date"] {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    [data-testid="test-todo-time-remaining"] {
      font-size: 0.8rem;
      font-family: var(--mono);
      color: var(--accent2);
      display: inline-block;
      margin-top: 2px;
    }

    [data-testid="test-todo-time-remaining"].overdue {
      color: var(--danger);
    }

    [data-testid="test-todo-time-remaining"].due-soon {
      color: var(--warn);
    }

    /* === TAGS === */
    ul[data-testid="test-todo-tags"] {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    ul[data-testid="test-todo-tags"] li {
      font-size: 0.72rem;
      font-family: var(--mono);
      padding: 4px 12px;
      border-radius: 100px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.04em;
      transition: border-color 0.2s, color 0.2s;
    }

    ul[data-testid="test-todo-tags"] li:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* === ACTION BUTTONS === */
    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-edit:hover {
      background: #1c1a33;
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-delete:hover {
      background: #2a1212;
      border-color: var(--danger);
      color: var(--danger);
    }

    /* icon SVGs */
    .btn svg { flex-shrink: 0; }

    /* === RESPONSIVE === */
    @media (max-width: 520px) {
      article[data-testid="test-todo-card"] { border-radius: 14px; }
      .card-inner { padding: 18px; }
      h2[data-testid="test-todo-title"] { font-size: 1rem; }
    }
  </style>
</head>
<body>

<article data-testid="test-todo-card" class="card-root" aria-label="Todo task card">
  <div class="card-stripe"></div>
  <div class="card-inner">

    <!-- Header: checkbox + title + badges -->
    <div class="card-header">
      <div class="toggle-wrap">
        <label for="task-toggle" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Mark task as complete</label>
        <input
          type="checkbox"
          id="task-toggle"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task as complete"
          onchange="handleToggle(this)"
        />
      </div>

      <div class="title-group">
        <h2 data-testid="test-todo-title">Redesign the onboarding flow screens</h2>
        <div class="badges">
          <span
            class="badge"
            data-testid="test-todo-priority"
            data-level="High"
            aria-label="Priority: High"
          >🔴 High</span>
          <span
            class="badge"
            data-testid="test-todo-status"
            id="status-badge"
            aria-label="Status: In Progress"
          >In Progress</span>
        </div>
      </div>
    </div>

    <!-- Description -->
    <p data-testid="test-todo-description">
      Revamp the three-step onboarding screens with updated copy, new illustrations, and improved accessibility. Coordinate with the copy team before finalising the designs.
    </p>

    <div class="divider"></div>

    <!-- Due date + time remaining -->
    <div class="date-block">
      <span class="date-label">Deadline</span>
      <time
        data-testid="test-todo-due-date"
        datetime="2026-04-16T23:59:00Z"
      >Due Apr 17, 2026</time>
      <span
        data-testid="test-todo-time-remaining"
        id="time-remaining"
        aria-live="polite"
        aria-atomic="true"
      >Calculating…</span>
    </div>

    <!-- Tags -->
    <ul data-testid="test-todo-tags" role="list" aria-label="Task tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
      <li data-testid="test-todo-tag-design">design</li>
    </ul>

    <!-- Action buttons -->
    <div class="card-actions">
      <button
        data-testid="test-todo-edit-button"
        class="btn btn-edit"
        aria-label="Edit task"
        onclick="console.log('edit clicked')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit
      </button>
      <button
        data-testid="test-todo-delete-button"
        class="btn btn-delete"
        aria-label="Delete task"
        onclick="alert('Delete clicked')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Delete
      </button>
    </div>

  </div>
</article>

<script>
  // === Time remaining logic ===
  const DUE_DATE = new Date('2026-04-17T23:59:00Z');

  function getTimeRemaining() {
    const now = Date.now();
    const diff = DUE_DATE.getTime() - now; // ms
    const absDiff = Math.abs(diff);

    const mins = Math.floor(absDiff / 60000);
    const hours = Math.floor(absDiff / 3600000);
    const days = Math.floor(absDiff / 86400000);

    if (Math.abs(diff) < 60000) return { text: 'Due now!', cls: 'due-soon' };

    if (diff > 0) {
      // future
      if (days === 0 && hours < 24) {
        if (hours === 0) return { text: `Due in ${mins} minute${mins !== 1 ? 's' : ''}`, cls: 'due-soon' };
        return { text: `Due in ${hours} hour${hours !== 1 ? 's' : ''}`, cls: 'due-soon' };
      }
      if (days === 1) return { text: 'Due tomorrow', cls: '' };
      return { text: `Due in ${days} day${days !== 1 ? 's' : ''}`, cls: '' };
    } else {
      // past
      if (hours < 24) return { text: `Overdue by ${hours} hour${hours !== 1 ? 's' : ''}`, cls: 'overdue' };
      return { text: `Overdue by ${days} day${days !== 1 ? 's' : ''}`, cls: 'overdue' };
    }
  }

  function updateTimeRemaining() {
    const el = document.getElementById('time-remaining');
    const { text, cls } = getTimeRemaining();
    el.textContent = text;
    el.className = cls;
  }

  updateTimeRemaining();
  setInterval(updateTimeRemaining, 60000);

  // === Checkbox toggle ===
  function handleToggle(checkbox) {
    const card = document.querySelector('[data-testid="test-todo-card"]');
    const statusBadge = document.getElementById('status-badge');

    if (checkbox.checked) {
      card.classList.add('done');
      statusBadge.textContent = 'Done';
      statusBadge.setAttribute('aria-label', 'Status: Done');
    } else {
      card.classList.remove('done');
      statusBadge.textContent = 'In Progress';
      statusBadge.setAttribute('aria-label', 'Status: In Progress');
    }
  }
</script>

</body>
</html>
